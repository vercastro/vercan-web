<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            background-color: #050505; /* Deep rich black */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Ambient Background */
        .background-glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            min-width: 400px;
            min-height: 400px;
            background: linear-gradient(45deg, #4f46e5, #9333ea, #ec4899);
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            animation: float 12s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(-5%, -5%) scale(0.9); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Layout Container */
        .container {
            text-align: center;
            max-width: 640px;
            padding: 2rem;
            z-index: 1;
        }

        /* Small Top Badge */
        .badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #a8b1ff;
            backdrop-filter: blur(10px);
        }

        /* Typography */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            margin: 0 0 1.2rem 0;
            line-height: 1.1;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Form Styles */
        .notify-form {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            max-width: 440px;
            margin: 0 auto;
        }

        input[type="email"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="email"]::placeholder {
            color: #64748b;
        }

        input[type="email"]:focus {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            background: white;
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .notify-form {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- The glowing ambient background -->
    <div class="background-glow"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="badge">Coming Soon</div>
        
        <h1>Something special is in the works.</h1>
        
        <p>We're designing a brand new experience. Drop your email below and be the first to know when we go live.</p>
        
        <!-- Demo Form (prevents page reload on submit) -->
        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks for subscribing! We will keep you updated.');">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>
</body>
</html>
