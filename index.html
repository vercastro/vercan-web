<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
        
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Layout Container */
        .container {
            text-align: center;
            max-width: 640px;
            padding: 2rem;
        }

        /* Small Top Badge */
        .badge {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: #313131;
            border: 1px solid #4e4e4e;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #475569;
        }

        /* Typography */
        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            margin: 0 0 1.2rem 0;
            line-height: 1.1;
            color: #ffffff;
        }

        p {
            font-size: 1.125rem;
            color: #ffffff;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Coming Soon</div>
        
        <h1>Something special is in the works.</h1>
        
        <p>www.vercan.ca</p>
    </div>
</body>
</html>
